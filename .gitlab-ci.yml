# ─────────────────────────────────────────────────────────────────────────────
# CI/CD: build the Laravel app on GitLab runners, then deploy to Hostinger
# (shared hosting) over SSH with rsync. Triggered on the default branch.
#
# Required CI/CD variables (Settings → CI/CD → Variables). See deploy/CICD.md:
#   SSH_PRIVATE_KEY  (type: Variable, "Protected", multi-line PEM private key)
#   SSH_HOST         e.g. 123.45.67.89  or  your server hostname
#   SSH_USER         e.g. u123456789
#   SSH_PORT         Hostinger shared hosting is usually 65002 (not 22)
#   DEPLOY_PATH      e.g. /home/u123456789/domains/yourdomain.com/public_html
#   PHP_BIN          optional; "php" by default, set to "php8.3" if needed
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - build
  - deploy

variables:
  COMPOSER_ALLOW_SUPERUSER: "1"
  GIT_DEPTH: "10"

# 1) PHP dependencies → vendor/
build:composer:
  stage: build
  image: composer:2
  script:
    - composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress
  artifacts:
    paths:
      - vendor/
    expire_in: 1 hour
  cache:
    key: composer-$CI_COMMIT_REF_SLUG
    paths:
      - vendor/

# 2) Front-end assets → public/build/
build:assets:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - public/build/
    expire_in: 1 hour
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/

# 3) Ship to Hostinger, then run remote artisan commands
deploy:production:
  stage: deploy
  image: alpine:latest
  needs:
    - build:composer
    - build:assets
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  variables:
    PHP_BIN: "php"
  before_script:
    - apk add --no-cache rsync openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    # Sync the app. No --delete: server-side .env and uploaded images are safe.
    - |
      rsync -az --no-perms --no-owner --no-group \
        --exclude='.git/' \
        --exclude='.github/' \
        --exclude='node_modules/' \
        --exclude='deploy/' \
        --exclude='tests/' \
        --exclude='.env' \
        --exclude='storage/logs/*' \
        --exclude='storage/framework/cache/data/*' \
        --exclude='storage/framework/sessions/*' \
        --exclude='storage/framework/views/*' \
        -e "ssh -p $SSH_PORT" \
        ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
    # Migrate + rebuild caches on the server.
    - |
      ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "set -e; cd '$DEPLOY_PATH'; \
        $PHP_BIN artisan migrate --force; \
        $PHP_BIN artisan storage:link || true; \
        $PHP_BIN artisan optimize:clear; \
        $PHP_BIN artisan config:cache; \
        $PHP_BIN artisan route:cache; \
        $PHP_BIN artisan view:cache"
  environment:
    name: production
    url: $APP_URL
