<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" fill="none" role="img" aria-label="Project cover placeholder">
  <defs>
    <linearGradient id="ln-bg" x1="0" y1="0" x2="1200" y2="750" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#ln-bg)"/>
  <circle cx="980" cy="170" r="250" fill="#14b8a6" fill-opacity="0.25"/>
  <circle cx="200" cy="640" r="220" fill="#4f46e5" fill-opacity="0.25"/>
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 250 H1200 M0 500 H1200 M300 0 V750 M600 0 V750 M900 0 V750"/>
  </g>

  <!-- chat / language motif -->
  <g transform="translate(900 430)">
    <rect x="-110" y="-80" width="180" height="120" rx="24" fill="#4f46e5" fill-opacity="0.6"/>
    <rect x="-40" y="-10" width="180" height="120" rx="24" fill="#14b8a6" fill-opacity="0.6"/>
    <text x="-20" y="62" font-family="Cairo, system-ui, sans-serif" font-size="60" font-weight="800" fill="#ffffff">Aあ</text>
  </g>

  <g transform="translate(150 300)">
    <rect x="0" y="0" width="150" height="150" rx="34" fill="#ffffff" fill-opacity="0.1" stroke="#5eead4" stroke-width="2"/>
    <text x="75" y="103" text-anchor="middle" font-family="Cairo, system-ui, sans-serif" font-size="84" font-weight="800" fill="#ffffff">L</text>
  </g>

  <g font-family="Cairo, system-ui, sans-serif" fill="#ffffff">
    <text x="150" y="540" font-size="62" font-weight="800">Learny</text>
    <text x="152" y="600" font-size="30" font-weight="600" fill="#99f6e4">Education</text>
  </g>

  <g transform="translate(1050 690)" text-anchor="end" font-family="Cairo, system-ui, sans-serif">
    <text fill="#cbd5e1" fill-opacity="0.7" font-size="24" font-weight="600">Cover placeholder</text>
  </g>
</svg>
