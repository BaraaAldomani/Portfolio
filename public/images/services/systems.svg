<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none" role="img" aria-label="Service illustration placeholder">
  <defs>
    <linearGradient id="sys-bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#312e81"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" rx="28" fill="url(#sys-bg)"/>
  <circle cx="650" cy="120" r="160" fill="#4f46e5" fill-opacity="0.25"/>
  <circle cx="140" cy="520" r="120" fill="#14b8a6" fill-opacity="0.18"/>

  <!-- dashboard panels -->
  <g transform="translate(250 150)">
    <rect x="0" y="0" width="300" height="80" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#818cf8" stroke-width="2"/>
    <circle cx="40" cy="40" r="16" fill="#5eead4"/>
    <rect x="74" y="28" width="180" height="10" rx="5" fill="#ffffff" fill-opacity="0.5"/>
    <rect x="74" y="50" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.3"/>

    <rect x="0" y="110" width="142" height="190" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#818cf8" stroke-width="2"/>
    <rect x="158" y="110" width="142" height="190" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#818cf8" stroke-width="2"/>
    <g fill="#14b8a6">
      <rect x="24" y="230" width="24" height="50" rx="4"/>
      <rect x="60" y="200" width="24" height="80" rx="4"/>
      <rect x="96" y="180" width="24" height="100" rx="4"/>
    </g>
    <circle cx="229" cy="195" r="55" fill="none" stroke="#5eead4" stroke-width="14" stroke-dasharray="200 120" stroke-linecap="round"/>
  </g>

  <g transform="translate(400 500)" text-anchor="middle" font-family="Cairo, system-ui, sans-serif">
    <text fill="#cbd5e1" font-size="26" font-weight="700">Illustration placeholder</text>
  </g>
</svg>
