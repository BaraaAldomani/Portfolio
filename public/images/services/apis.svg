<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none" role="img" aria-label="Service illustration placeholder">
  <defs>
    <linearGradient id="api-bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" rx="28" fill="url(#api-bg)"/>
  <circle cx="180" cy="140" r="140" fill="#4f46e5" fill-opacity="0.2"/>
  <circle cx="640" cy="470" r="140" fill="#14b8a6" fill-opacity="0.2"/>

  <!-- connection nodes -->
  <g transform="translate(400 270)" stroke="#5eead4" stroke-width="3" stroke-opacity="0.7">
    <line x1="-180" y1="-90" x2="0" y2="0"/>
    <line x1="180" y1="-90" x2="0" y2="0"/>
    <line x1="-180" y1="90" x2="0" y2="0"/>
    <line x1="180" y1="90" x2="0" y2="0"/>
  </g>
  <g transform="translate(400 270)">
    <circle r="56" fill="#4f46e5"/>
    <g font-family="ui-monospace, monospace" fill="#ffffff" text-anchor="middle" font-size="44" font-weight="700">
      <text y="16">{ }</text>
    </g>
    <g fill="#0f172a" stroke="#5eead4" stroke-width="3">
      <circle cx="-180" cy="-90" r="34"/>
      <circle cx="180" cy="-90" r="34"/>
      <circle cx="-180" cy="90" r="34"/>
      <circle cx="180" cy="90" r="34"/>
    </g>
    <g fill="#5eead4">
      <circle cx="-180" cy="-90" r="12"/>
      <circle cx="180" cy="-90" r="12"/>
      <circle cx="-180" cy="90" r="12"/>
      <circle cx="180" cy="90" r="12"/>
    </g>
  </g>

  <g transform="translate(400 510)" text-anchor="middle" font-family="Cairo, system-ui, sans-serif">
    <text fill="#cbd5e1" font-size="26" font-weight="700">Illustration placeholder</text>
  </g>
</svg>
