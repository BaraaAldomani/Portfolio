<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000" fill="none" role="img" aria-label="Portrait placeholder">
  <defs>
    <linearGradient id="hp-bg" x1="0" y1="0" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="hp-glow" cx="0.5" cy="0.32" r="0.7">
      <stop stop-color="#4f46e5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hp-ring" x1="0" y1="0" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" rx="32" fill="url(#hp-bg)"/>
  <rect width="800" height="1000" rx="32" fill="url(#hp-glow)"/>

  <!-- decorative grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 250 H800 M0 500 H800 M0 750 H800 M200 0 V1000 M400 0 V1000 M600 0 V1000"/>
  </g>

  <!-- avatar -->
  <g transform="translate(400 430)">
    <circle r="250" fill="none" stroke="url(#hp-ring)" stroke-width="3" stroke-opacity="0.6"/>
    <circle r="210" fill="#0f172a"/>
    <g fill="#cbd5e1" fill-opacity="0.9">
      <circle cx="0" cy="-40" r="92"/>
      <path d="M-150 200 C-150 60 -80 20 0 20 C80 20 150 60 150 200 Z"/>
    </g>
  </g>

  <!-- floating accent dots -->
  <circle cx="120" cy="160" r="10" fill="#14b8a6"/>
  <circle cx="690" cy="300" r="14" fill="#818cf8"/>
  <circle cx="640" cy="120" r="7" fill="#5eead4"/>

  <!-- label -->
  <g transform="translate(400 860)" text-anchor="middle" font-family="Cairo, system-ui, sans-serif">
    <rect x="-150" y="-34" width="300" height="68" rx="34" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text y="8" fill="#e2e8f0" font-size="30" font-weight="700">Your photo here</text>
  </g>
</svg>
