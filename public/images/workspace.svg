<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" fill="none" role="img" aria-label="Workspace placeholder">
  <defs>
    <linearGradient id="ws-bg" x1="0" y1="0" x2="1200" y2="750" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eef1f6"/>
      <stop offset="1" stop-color="#e0e5ef"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" rx="20" fill="url(#ws-bg)"/>
  <circle cx="980" cy="160" r="170" fill="#ffffff" fill-opacity="0.5"/>

  <!-- monitor -->
  <g transform="translate(330 170)">
    <rect x="0" y="0" width="540" height="320" rx="16" fill="#ffffff" stroke="#cfd6e3" stroke-width="2"/>
    <rect x="22" y="22" width="496" height="240" rx="8" fill="#f4f6fb"/>
    <!-- code lines -->
    <g>
      <rect x="44" y="48" width="120" height="12" rx="6" fill="#4f46e5" fill-opacity="0.7"/>
      <rect x="176" y="48" width="200" height="12" rx="6" fill="#94a0b8"/>
      <rect x="68" y="80" width="260" height="12" rx="6" fill="#14b8a6" fill-opacity="0.7"/>
      <rect x="68" y="112" width="180" height="12" rx="6" fill="#94a0b8"/>
      <rect x="68" y="144" width="300" height="12" rx="6" fill="#94a0b8"/>
      <rect x="44" y="176" width="120" height="12" rx="6" fill="#4f46e5" fill-opacity="0.7"/>
      <rect x="176" y="176" width="150" height="12" rx="6" fill="#94a0b8"/>
      <rect x="44" y="208" width="90" height="12" rx="6" fill="#94a0b8"/>
    </g>
    <rect x="240" y="320" width="60" height="40" fill="#cfd6e3"/>
    <rect x="180" y="360" width="180" height="14" rx="7" fill="#cfd6e3"/>
  </g>

  <!-- desk objects -->
  <rect x="170" y="470" width="180" height="120" rx="10" fill="#ffffff" stroke="#cfd6e3" stroke-width="2"/>
  <g stroke="#cfd6e3" stroke-width="2"><path d="M185 500h150M185 525h120M185 550h140"/></g>
  <circle cx="930" cy="540" r="38" fill="#ffffff" stroke="#cfd6e3" stroke-width="2"/>
  <path d="M930 522v36M912 540h36" stroke="#94a0b8" stroke-width="3" stroke-linecap="round"/>

  <g transform="translate(600 660)" text-anchor="middle" font-family="Geist, system-ui, sans-serif">
    <text fill="#7a8398" font-size="22" font-weight="600">Workspace photo placeholder</text>
  </g>
</svg>
